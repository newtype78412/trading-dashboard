<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinanceBot 績效儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:20px}
h1{font-size:20px;font-weight:500;margin-bottom:2px}
.sub{font-size:13px;color:#888;margin-bottom:12px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filters button{padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#555;transition:all .15s}
.filters button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
@media(max-width:500px){.grid4{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e8e8e8;margin-bottom:16px}
.metric{background:#f9f9f9;border-radius:8px;padding:14px;text-align:center;border:1px solid #ececec}
.metric .lbl{font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.metric .val{font-size:20px;font-weight:500}
.metric .sub2{font-size:11px;color:#aaa;margin-top:3px}
.pos{color:#1D9E75}.neg{color:#D85A30}.neu{color:#185FA5}
.hdr{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.ch-wrap{position:relative;height:220px}
.ch-wrap-sm{position:relative;height:180px}
.row-t{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row-t:last-child{border:none}
.sym{font-weight:500}.tf{font-size:11px;color:#aaa}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500}
.tw{background:#EAF3DE;color:#3B6D11}.tl{background:#FCEBEB;color:#A32D2D}
.pos-tag-l{background:#EAF3DE;color:#3B6D11;display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.pos-tag-s{background:#FCEBEB;color:#A32D2D;display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;color:#888;border-bottom:2px solid #f0f0f0;font-weight:500}
.tbl td{padding:9px 10px;border-bottom:1px solid #f5f5f5}
.tbl tr:last-child td{border:none}
.legend{display:flex;gap:16px;font-size:12px;color:#888;margin-bottom:8px;flex-wrap:wrap}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.updated{font-size:11px;color:#bbb;text-align:right;margin-top:8px}
.empty{text-align:center;color:#bbb;padding:24px;font-size:13px}
</style>
</head>
<body>
<h1>BinanceBot 績效儀表板</h1>
<div class="sub">Scoring 策略 · Vegas+QQE · 最後更新：2026-06-14 23:05</div>

<div class="filters">
  <button onclick="setFilter('week')" id="btn-week">本週</button>
  <button onclick="setFilter('month')" id="btn-month">本月</button>
  <button onclick="setFilter('30d')" id="btn-30d">30天</button>
  <button onclick="setFilter('all')" id="btn-all" class="active">全部</button>
</div>

<!-- Summary Cards Row 1 -->
<div class="grid4" id="cards1"></div>
<!-- Summary Cards Row 2 -->
<div class="grid4" id="cards2"></div>

<!-- Charts Row 1: Daily PnL | Symbol PnL Ranking -->
<div class="grid2">
  <div class="card">
    <div class="hdr">每日損益 + 累積 PnL</div>
    <div class="legend">
      <span><span class="ld" style="background:#5DCAA5"></span>止盈</span>
      <span><span class="ld" style="background:#F0997B"></span>止損</span>
      <span><span class="ld" style="background:#378ADD;border-radius:50%"></span>累積</span>
    </div>
    <div class="ch-wrap"><canvas id="pnlChart"></canvas></div>
  </div>
  <div class="card">
    <div class="hdr">幣種總損益排行</div>
    <div class="ch-wrap"><canvas id="symPnlChart"></canvas></div>
  </div>
</div>

<!-- Charts Row 2: Hourly | Weekly -->
<div class="grid2">
  <div class="card">
    <div class="hdr">每小時勝/敗分佈</div>
    <div class="legend">
      <span><span class="ld" style="background:#5DCAA5"></span>止盈</span>
      <span><span class="ld" style="background:#F0997B"></span>止損</span>
    </div>
    <div class="ch-wrap"><canvas id="hourChart"></canvas></div>
  </div>
  <div class="card">
    <div class="hdr">星期勝/敗分佈</div>
    <div class="legend">
      <span><span class="ld" style="background:#5DCAA5"></span>止盈</span>
      <span><span class="ld" style="background:#F0997B"></span>止損</span>
    </div>
    <div class="ch-wrap-sm"><canvas id="weekChart"></canvas></div>
  </div>
</div>

<!-- Symbol Win Rate -->
<div class="card">
  <div class="hdr">幣種勝率（前10）</div>
  <div class="ch-wrap-sm"><canvas id="symWrChart"></canvas></div>
</div>

<!-- Current Positions -->
<div class="card">
  <div class="hdr">當前持倉</div>
  <div id="posSection"></div>
</div>

<!-- Recent Trades -->
<div class="card">
  <div class="hdr">最近交易紀錄</div>
  <div id="recentSection"></div>
</div>

<div class="updated">資料來源：Binance API · oi_trades_log.csv</div>

// ── 工具 ─────────────────────────────────────────────────────
const r2 = v => Math.round(v * 100) / 100;
const r1 = v => Math.round(v * 10) / 10;

function filterTrades(period) {
  if (period === 'all') return ALL_TRADES;
  const now = new Date();
  let start;
  if (period === 'week') {
    const d = new Date(now);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    start = d;
  } else if (period === 'month') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
  } else if (period === '30d') {
    start = new Date(now - 30 * 86400000);
  }
  return ALL_TRADES.filter(t => new Date(t.time) >= start);
}

function computeStats(trades) {
  if (!trades.length) return null;
  const wins   = trades.filter(t => t.pnl >= 0);
  const losses = trades.filter(t => t.pnl < 0);
  const totalPnl     = trades.reduce((s, t) => s + t.pnl, 0);
  const totalFunding = trades.reduce((s, t) => s + (t.funding||0), 0);
  const totalNet     = totalPnl + totalFunding;

  // Daily PnL
  const dailyW = {}, dailyL = {};
  trades.forEach(t => {
    const d = t.time.slice(0,10);
    if (t.pnl >= 0) dailyW[d] = (dailyW[d]||0) + t.pnl;
    else             dailyL[d] = (dailyL[d]||0) + Math.abs(t.pnl);
  });
  const days = [...new Set(trades.map(t=>t.time.slice(0,10)))].sort();
  let cum = 0;
  const cumPnl = days.map(d => { cum += (dailyW[d]||0)-(dailyL[d]||0); return r2(cum); });

  // Symbol PnL & WR
  const symPnl = {}, symW = {}, symT = {};
  trades.forEach(t => {
    symPnl[t.symbol] = (symPnl[t.symbol]||0) + t.pnl;
    symT[t.symbol]   = (symT[t.symbol]||0) + 1;
    if (t.pnl >= 0) symW[t.symbol] = (symW[t.symbol]||0) + 1;
  });

  // Hourly
  const hourW = Array(24).fill(0), hourL = Array(24).fill(0);
  trades.forEach(t => {
    const h = parseInt(t.time.slice(11,13));
    if (t.pnl >= 0) hourW[h]++; else hourL[h]++;
  });

  // Weekly (0=Mon)
  const weekW = Array(7).fill(0), weekL = Array(7).fill(0);
  trades.forEach(t => {
    const dow = (new Date(t.time).getDay() + 6) % 7;
    if (t.pnl >= 0) weekW[dow]++; else weekL[dow]++;
  });

  // Max consecutive loss
  let maxCL = 0, curCL = 0;
  [...trades].sort((a,b)=>a.time.localeCompare(b.time)).forEach(t => {
    if (t.pnl < 0) { curCL++; maxCL = Math.max(maxCL, curCL); } else curCL = 0;
  });

  // Max drawdown
  let peak = 0, maxDD = 0, runC = 0;
  [...trades].sort((a,b)=>a.time.localeCompare(b.time)).forEach(t => {
    runC += t.pnl;
    peak = Math.max(peak, runC);
    maxDD = Math.max(maxDD, peak - runC);
  });

  // Avg holding hours
  const holds = trades
    .filter(t => t.close_time)
    .map(t => (new Date(t.close_time) - new Date(t.time)) / 3600000);
  const avgHold = holds.length ? holds.reduce((s,v)=>s+v,0)/holds.length : null;

  return {
    total: trades.length, wins: wins.length, losses: losses.length,
    totalPnl: r2(totalPnl), totalFunding: r2(totalFunding), totalNet: r2(totalNet),
    winRate: r1(wins.length / trades.length * 100),
    best: r2(Math.max(...trades.map(t=>t.pnl))),
    worst: r2(Math.min(...trades.map(t=>t.pnl))),
    avgHold: avgHold ? r1(avgHold) : null,
    maxCL, maxDD: r2(maxDD),
    days,
    dailyW: days.map(d => r2(dailyW[d]||0)),
    dailyL: days.map(d => r2(dailyL[d]||0)),
    cumPnl,
    symPnl, symW, symT,
    hourW, hourL, weekW, weekL,
    recent: [...trades].sort((a,b)=>b.time.localeCompare(a.time)).slice(0,10),
  };
}

// ── 卡片 ─────────────────────────────────────────────────────
function renderCards(s) {
  const pnlCls  = s.totalNet >= 0 ? 'pos' : 'neg';
  const pnlSign = s.totalNet >= 0 ? '+' : '';
  const fundSign = s.totalFunding >= 0 ? '+' : '';

  document.getElementById('cards1').innerHTML = `
    <div class="metric"><div class="lbl">總損益（含資金費）</div>
      <div class="val ${pnlCls}">${pnlSign}$${Math.abs(s.totalNet)}</div>
      <div class="sub2">交易 ${s.totalPnl>=0?'+':''}$${s.totalPnl} · 費 ${fundSign}$${Math.abs(s.totalFunding)}</div></div>
    <div class="metric"><div class="lbl">勝率</div>
      <div class="val">${s.winRate}%</div>
      <div class="sub2">${s.wins}勝 / ${s.losses}敗</div></div>
    <div class="metric"><div class="lbl">總筆數</div>
      <div class="val">${s.total} 筆</div></div>
    <div class="metric"><div class="lbl">最佳 / 最差</div>
      <div class="val"><span class="pos">+$${s.best}</span></div>
      <div class="sub2 neg">$${s.worst}</div></div>`;

  const holdStr = s.avgHold !== null
    ? (s.avgHold >= 1 ? `${r1(s.avgHold)}h` : `${Math.round(s.avgHold*60)}m`)
    : 'N/A';
  const ddCls = s.maxDD > 30 ? 'neg' : s.maxDD > 10 ? '' : 'pos';

  document.getElementById('cards2').innerHTML = `
    <div class="metric"><div class="lbl">最大回撤</div>
      <div class="val ${ddCls}">-$${s.maxDD}</div></div>
    <div class="metric"><div class="lbl">最大連虧</div>
      <div class="val ${s.maxCL >= 5 ? 'neg' : ''}">${s.maxCL} 筆</div></div>
    <div class="metric"><div class="lbl">平均持倉</div>
      <div class="val">${holdStr}</div></div>
    <div class="metric"><div class="lbl">每筆期望值</div>
      <div class="val ${r2(s.totalPnl/s.total) >= 0 ? 'pos':'neg'}">${r2(s.totalPnl/s.total) >= 0 ? '+' : ''}$${r2(s.totalPnl/s.total)}</div></div>`;
}

// ── 圖表更新 ─────────────────────────────────────────────────
function updateCharts(s) {
  // Daily PnL
  charts.pnl.data.labels = s.days;
  charts.pnl.data.datasets[0].data = s.dailyW;
  charts.pnl.data.datasets[1].data = s.dailyL;
  charts.pnl.data.datasets[2].data = s.cumPnl;
  charts.pnl.update();

  // Symbol PnL ranking (sorted by PnL, top 12)
  const symPnlSorted = Object.entries(s.symPnl)
    .sort((a,b)=>b[1]-a[1]).slice(0,12);
  charts.symPnl.data.labels = symPnlSorted.map(([sym])=>sym.replace('USDT',''));
  charts.symPnl.data.datasets[0].data = symPnlSorted.map(([,v])=>r2(v));
  charts.symPnl.data.datasets[0].backgroundColor = symPnlSorted.map(([,v])=>v>=0?'#5DCAA5':'#F0997B');
  charts.symPnl.update();

  // Hourly
  charts.hour.data.datasets[0].data = s.hourW;
  charts.hour.data.datasets[1].data = s.hourL;
  charts.hour.update();

  // Weekly
  charts.week.data.datasets[0].data = s.weekW;
  charts.week.data.datasets[1].data = s.weekL;
  charts.week.update();

  // Symbol WR (top 10 by total trades)
  const symWrSorted = Object.entries(s.symT)
    .map(([sym,t]) => ({ sym, wr: r1((s.symW[sym]||0)/t*100), t }))
    .sort((a,b)=>b.t-a.t).slice(0,10)
    .sort((a,b)=>b.wr-a.wr);
  charts.symWr.data.labels = symWrSorted.map(d=>d.sym.replace('USDT',''));
  charts.symWr.data.datasets[0].data = symWrSorted.map(d=>d.wr);
  charts.symWr.data.datasets[0].backgroundColor = symWrSorted.map(d=>
    d.wr>=65?'#5DCAA5':d.wr>=50?'#FAC775':'#F0997B');
  charts.symWr.update();
}

// ── 持倉渲染 ─────────────────────────────────────────────────
function renderPositions() {
  const el = document.getElementById('posSection');
  if (!POSITIONS.length) {
    el.innerHTML = '<div class="empty">目前無開倉中的倉位</div>';
    return;
  }
  let html = `<table class="tbl"><thead><tr>
    <th>幣種</th><th>方向</th><th>手數</th><th>入場價</th><th>現價</th><th>漲跌%</th><th>未實現損益</th>
  </tr></thead><tbody>`;
  POSITIONS.forEach(p => {
    const upnlCls = p.upnl >= 0 ? 'pos' : 'neg';
    const upnlSign = p.upnl >= 0 ? '+' : '';
    const pctCls = p.pct >= 0 ? 'pos' : 'neg';
    const dirTag = p.direction === 'long'
      ? '<span class="pos-tag-l">多</span>'
      : '<span class="pos-tag-s">空</span>';
    html += `<tr>
      <td><strong>${p.symbol}</strong></td>
      <td>${dirTag}</td>
      <td>${p.qty}</td>
      <td>${p.entry}</td>
      <td>${p.price}</td>
      <td class="${pctCls}">${p.pct >= 0 ? '+' : ''}${p.pct}%</td>
      <td class="${upnlCls}">${upnlSign}$${Math.abs(p.upnl)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── 最近交易渲染 ──────────────────────────────────────────────
function renderRecent(trades) {
  const el = document.getElementById('recentSection');
  if (!trades.length) { el.innerHTML = '<div class="empty">無交易紀錄</div>'; return; }
  let html = '';
  trades.forEach(t => {
    const pnl = t.pnl;
    const sign = pnl >= 0 ? '+' : '';
    const cls  = pnl >= 0 ? 'tw' : 'tl';
    const holdStr = t.close_time
      ? (() => {
          const h = (new Date(t.close_time) - new Date(t.time)) / 3600000;
          return h >= 1 ? `${r1(h)}h` : `${Math.round(h*60)}m`;
        })()
      : '';
    html += `<div class="row-t">
      <span>
        <span class="sym">${t.symbol}</span>
        <span class="tf"> · ${t.direction} · ${t.time.slice(0,10)}${holdStr ? ' · 持倉'+holdStr : ''}</span>
      </span>
      <span class="tag ${cls}">${t.result} ${sign}$${Math.abs(pnl).toFixed(2)}</span>
    </div>`;
  });
  el.innerHTML = html;
}

// ── 主渲染 ───────────────────────────────────────────────────
function renderAll(trades) {
  const s = computeStats(trades);
  if (!s) {
    document.getElementById('cards1').innerHTML =
    document.getElementById('cards2').innerHTML = '<div class="empty">無資料</div>';
    return;
  }
  renderCards(s);
  updateCharts(s);
  renderRecent(s.recent);
}

// ── 篩選按鈕 ─────────────────────────────────────────────────
function setFilter(f) {
  ['week','month','30d','all'].forEach(k => {
    document.getElementById('btn-'+k).classList.toggle('active', k===f);
  });
  renderAll(filterTrades(f));
}

// ── 初始化 ───────────────────────────────────────────────────
initCharts();
renderPositions();
renderAll(ALL_TRADES);
</script>

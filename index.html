<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinanceBot 績效儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:20px}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:700px){.grid4{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
.card{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e8e8e8}
.metric{background:#f9f9f9;border-radius:8px;padding:14px;text-align:center;border:1px solid #ececec}
.metric .lbl{font-size:12px;color:#888;margin-bottom:6px}
.metric .val{font-size:22px;font-weight:500}
.pos{color:#1D9E75}.neg{color:#D85A30}.blue{color:#185FA5}
.hdr{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.row:last-child{border:none}
.sym{font-weight:500}.tf{font-size:11px;color:#aaa}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500}
.tw{background:#EAF3DE;color:#3B6D11}.tl{background:#FCEBEB;color:#A32D2D}
.legend{display:flex;gap:16px;font-size:12px;color:#888;margin-bottom:8px;flex-wrap:wrap}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.updated{font-size:11px;color:#bbb;text-align:right;margin-top:16px}
</style>
</head>
<body>
<h1>BinanceBot 績效儀表板</h1>
<div class="sub">Scoring 策略 · Vegas+QQE · 最後更新：2026-06-14 00:25</div>

<div class="grid4">
  <div class="metric"><div class="lbl">總損益</div>
    <div class="val pos">+$23.39</div></div>
  <div class="metric"><div class="lbl">勝率</div>
    <div class="val">50.0%</div></div>
  <div class="metric"><div class="lbl">已平倉筆數</div>
    <div class="val">2 筆</div></div>
  <div class="metric"><div class="lbl">止盈 / 止損</div>
    <div class="val"><span class="pos">1</span> / <span class="neg">1</span></div></div>
</div>

<div class="grid2">
  <div class="card">
    <div class="hdr">每日損益 + 累積 PnL</div>
    <div class="legend">
      <span><span class="ld" style="background:#5DCAA5"></span>止盈</span>
      <span><span class="ld" style="background:#F0997B"></span>止損</span>
      <span><span class="ld" style="background:#378ADD;border-radius:50%"></span>累積</span>
    </div>
    <div style="position:relative;height:220px">
      <canvas id="pnlChart" role="img" aria-label="每日損益與累積PnL圖表"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="hdr">幣種勝率（前10）</div>
    <div style="position:relative;height:252px">
      <canvas id="symChart" role="img" aria-label="各幣種勝率長條圖"></canvas>
    </div>
  </div>
</div>

<div class="card">
  <div class="hdr">最近交易紀錄</div>
  <div id="recent"></div>
</div>

<div class="updated">資料來源：oi_trades_log.csv · 最佳單筆：+$23.67 · 最差：$-0.28</div>

<script>
const DAYS=["2026-06-13"];
const DWIN=[23.67];
const DLOSS=[0.28];
const CUM=[23.39];
const SYML=["TAOUSDT", "CRVUSDT"];
const SYMR=[100.0, 0.0];
const RECENT=[{"time": "2026-06-13 21:31:32", "symbol": "TAOUSDT", "direction": "long", "qty": 1.925, "entry": 0.0, "pnl": 23.67, "result": "\u6b62\u76c8"}, {"time": "2026-06-13 15:12:34", "symbol": "CRVUSDT", "direction": "long", "qty": 2834.0, "entry": 0.0, "pnl": -0.28, "result": "\u6b62\u640d"}];

new Chart(document.getElementById('pnlChart'),{
  type:'bar',
  data:{
    labels:DAYS,
    datasets:[
      {type:'bar',label:'止盈',data:DWIN,backgroundColor:'#5DCAA5',borderRadius:3},
      {type:'bar',label:'止損',data:DLOSS,backgroundColor:'#F0997B',borderRadius:3},
      {type:'line',label:'累積',data:CUM,borderColor:'#378ADD',backgroundColor:'transparent',
        pointBackgroundColor:'#378ADD',pointRadius:3,tension:0.3,yAxisID:'y2'}
    ]
  },
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      y:{beginAtZero:true,ticks:{callback:v=>'$'+v,font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},
      y2:{position:'right',ticks:{callback:v=>'$'+v,font:{size:10}},grid:{display:false}}
    }
  }
});

new Chart(document.getElementById('symChart'),{
  type:'bar',
  data:{
    labels:SYML,
    datasets:[{data:SYMR,
      backgroundColor:SYMR.map(v=>v>=65?'#5DCAA5':v>=50?'#FAC775':'#F0997B'),
      borderRadius:3}]
  },
  options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},
      y:{ticks:{font:{size:11}}}
    }
  }
});

const el = document.getElementById('recent');
RECENT.forEach(t=>{
  const pnl = parseFloat(t.pnl);
  const sign = pnl>=0?'+':'';
  const cls = pnl>=0?'tw':'tl';
  el.innerHTML += `<div class="row">
    <span><span class="sym">${t.symbol}</span><br><span class="tf">${t.direction} · ${t.time.slice(0,10)}</span></span>
    <span class="tag ${cls}">${t.result} ${sign}${pnl.toFixed(2)}</span>
  </div>`;
});
</script>
</body>
</html>
